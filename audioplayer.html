<html>
    
    <head>
        <title>audioplayer</title>
        <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Jersey+10&display=swap">
        <style> 
            body{font-family: "Jersey 10"} 
            input[type=file]{color:transparent}
        </style>
    </head>

    <body>

        <div style="display: flex; justify-content: center; align-items: center; font-size: 200%;">
            <label for="audio-upload">Upload song folder: </label>
        </div>
        <div style="display: flex; justify-content: center; align-items: center; margin-left: 185px;">
            <input id="audio-upload" type="file" webkitdirectory multiple/>
        </div>

        <script>

            let textcolor = "#CC1818"
            let backgroundcolor = "#000000"
            let barcolor = "#CC1818"

            let playlist = []
            let pindex = -1

            document.body.style.color = textcolor
            document.body.style.backgroundColor = backgroundcolor

            function createfilearray({target})
            {
                if (!target.files.length) return

                pindex = -1
                playlist = []
                allowed = /(\.ogg|\.mp3|\.wav|\.opus)$/i;

                for(let i = 0; i < target.files.length; i++)
                {
                    if(allowed.exec(target.files[i].name))
                        playlist.push(target.files[i])
                }

                shuffle(playlist)
            }

            function playsong()
            {
                if (playlist.length < 1) return

                urlObj = URL.createObjectURL(playlist[pindex]);

                while (document.body.children.length > 2) 
                    document.body.removeChild(document.body.lastChild);

                let songdiv = document.createElement("div")

                let audio = document.createElement("audio");

                //Clean up
                audio.addEventListener("load", () => {URL.revokeObjectURL(urlObj);});

                //Set the src and start loading the audio from the file
                audio.src = urlObj;

                //song info
                let songinfo = document.createElement("p");
                songinfo.style.position = "absolute"
                songinfo.style.bottom = "16%"
                songinfo.style.fontSize = "40px"

                //song name
                songinfo.appendChild(document.createTextNode(pindex + ". " + playlist[pindex].name.replace(/\.[^/\\.]+$/, "")))

                audio.onloadedmetadata = (event) => 
                {   
                    //song duration
                    duration = pad(Math.floor(audio.duration / 60),2) + ":" + pad(Math.floor(audio.duration % 60),2)
                    durationtxt = document.createElement("p")
                    durationtxt.innerHTML = duration
                    durationtxt.style.position = "absolute"
                    durationtxt.style.bottom = "2%"
                    durationtxt.style.fontSize = "40px"
                    
                    //progressbar with slider
                    progressbardiv = document.createElement("div")
                    progressbar = document.createElement("input")
                    progressbar.value = 0
                    progressbar.max = audio.duration
                    progressbar.min = 0
                    progressbar.style.accentColor = barcolor
                    progressbar.style.width = "75%"
                    progressbar.style.height = "2rem"
                    progressbar.style.position = "absolute"
                    progressbar.style.bottom = "15%"
                    
                    progressbar.type = "range"
                    progressbar.value = 0
                    progressbar.min = 0
                    progressbar.max = audio.duration
                    progressbar.oninput = function(){audio.currentTime =  progressbar.value}
                    songdiv.appendChild(songinfo)
                    songdiv.appendChild(audio)
                    songdiv.appendChild(durationtxt)

                    progressbardiv.appendChild(progressbar)

                    songdiv.style.display = "flex"
                    songdiv.style.justifyContent ="center"
                    songdiv.align = "center"

                    progressbardiv.style.display = "flex"
                    progressbardiv.style.justifyContent = "center"
                    progressbardiv.align = "center"

                    document.body.appendChild(songdiv)
                    document.body.appendChild(progressbardiv)

                    audio.play()
                }
            }

            function shuffle(array)
            {
                let currentIndex = array.length;

                while (currentIndex != 0) 
                {
                    let randomIndex = Math.floor(Math.random() * currentIndex);
                    currentIndex--;

                    [array[currentIndex], array[randomIndex]] = [array[randomIndex], array[currentIndex]];
                }
            }

            function pad(num, size) 
            {
                s = num + '';
                while (s.length < size) {s = '0' + s;}
                return s;
            }

            document.addEventListener("change", createfilearray)
            document.addEventListener("keydown", (e) => 
            {
                if (e.key == "d")
                {
                    goforward()
                }
                else if (e.key == "a")
                {
                    goback()
                }
                else if (e.key == " ")
                {
                    pausesong()
                }
            })
            
            function pausesong()
            {
                audio = document.body.children[2].children[1]

                if(!audio.paused)
                    audio.pause()
                else
                    audio.play()
            }

            function goforward()
            {
                if (pindex < playlist.length-1)
                    {pindex++}
                else
                    {
                        shuffle(playlist)
                        pindex = 0
                    }
                    
                playsong()
            }

            function goback()
            {
                if (pindex > 0)
                {
                    pindex--
                    playsong()
                }
            }

            function updatetimer()
            {
                //document.body.(songdiv).(audio)
                audio = document.body.children[2].children[1]
                time = audio.duration - audio.currentTime

                if (time <= 0)
                    goforward()

                time = pad(Math.floor(time / 60),2) + ":" + pad(Math.floor(time % 60),2)

                //document.body.(songdiv).(songinfo).(timer)
                document.body.children[2].children[2].innerHTML = time
                
                //change progress slider
                document.body.children[3].children[0].value = audio.currentTime
            }

            //update every 250ms
            setInterval(updatetimer, 250)

//--------------------| MOBILE CONTROLS |-------------------------------------------------------------------------------------------------------------------------

            let tsx = 0
            let tsy = 0

            document.addEventListener("touchstart", (e) =>
            {
                tsx = e.touches[0].clientX
                tsy = e.touches[0].clientY
            })
            document.addEventListener("touchend", (e) =>
            {
                xdir = e.changedTouches[0].clientX - tsx;
                ydir = e.changedTouches[0].clientY - tsy;

                if (window.innerHeight*.7 > tsy)
                {
                    if(xdir < -150)
                        goforward()
                    else if(xdir > 150)
                        goback()
                    else if (xdir > -11 && xdir < 11 && ydir > -11 && ydir < 11)
                        pausesong()
                }
            })

        </script>

    </body>

</html>
